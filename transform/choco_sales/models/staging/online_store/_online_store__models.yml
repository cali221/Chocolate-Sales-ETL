version: 2

models:
  - name: stg_online_store__countries
    description: "Countries of customers of the online store"
    columns:
      - name: country_id
        data_type: integer
        data_tests: 
          - not_null
          - unique
      - name: country_name
        data_type: varchar(50)
        data_tests: 
          - not_null
          - unique
  - name: stg_online_store__customers
    description: "Customers of the online store"
    columns:
      - name: customer_id
        data_type: integer
        data_tests: 
          - not_null
          - unique
      - name: customer_name
        data_type: varchar(50)
        data_tests: 
          - not_null
      - name: customer_username
        data_type: varchar(50)
        data_tests:
          - not_null
          - unique
      - name: customer_email
        data_type: varchar(100)
        data_tests: 
          - not_null
      - name: customer_country_id
        description: "Country ID of the country the customer is from"
        data_type: integer
        data_tests: 
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_online_store__countries')
                field: country_id
  - name: stg_online_store__products
    description: "Products available in online store"
    columns:
      - name: product_id
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: product_name
        data_type: varchar(50)
        data_tests:
          - not_null
      - name: product_current_price
        data_type: numeric(10, 3)
        data_tests:
          - not_null
  - name: stg_online_store__statuses
    description: "Available statuses for orders from the online store"
    columns:
      - name: status_id
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: status_name
        data_type: varchar(50)
        data_tests: 
          - not_null
          - unique
  - name: stg_online_store__orders
    description: "Orders from online store"
    columns:
      - name: order_id
        data_type: integer
        data_tests: 
          - not_null
          - unique
      - name: order_created_at
        description: "The timestamp with timezone at which the order was created"
        data_type: timestamptz
        data_tests:
          - not_null
      - name: order_status_last_updated_at
        description: "The timestamp with timezone at which the order's status was last updated"
        data_type: timestamptz
        data_tests:
          - not_null
      - name: order_current_status_id
        description: "Status ID of the current order status"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_online_store__statuses')
                field: status_id
      - name: order_customer_id
        description: "Customer ID of the customer that made the order"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_online_store__customers')
                field: customer_id
      - name: order_tax_amount_usd
        description: "Tax amount for the order in USD"
        data_type: numeric(10, 3)
        data_tests:
          - not_null
      - name: order_discount_amount_usd
        description: "Discount amount for the order in USD"
        data_type: numeric(10, 3)
        data_tests:
          - not_null
      - name: order_shipping_costs_amount_usd
        description: "Shipping costs for the order in USD"
        data_type: numeric(10, 3)
        data_tests: 
          - not_null
  - name: stg_online_store__order_status_history
    description: "Status history for orders from the online store"
    columns: 
      - name: order_status_history_id
        description: "ID of the status history entry"
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: order_status_history_order_id
        description: "ID of the order the status was updated for"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_online_store__orders')
                field: order_id
      - name: order_status_history_status_id
        description: "ID of the new status"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_online_store__statuses')
                field: status_id
      - name: order_status_history_updated_at
        description: "The timestamp at which the status update was made"
        data_type: timestamptz
        data_tests:
          - not_null
  - name: stg_online_store__order_items
    description: "Items ordered in different orders from the online store"
    columns:
      - name: order_item_id
        description: "ID of the order item entry for each item in an order"
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: order_item_product_id
        description: "ID of the product/item"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_online_store__products')
                field: product_id
      - name: order_item_order_id
        description: "ID of the order"
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_online_store__orders')
                field: order_id
      - name: order_item_quantity
        description: "Quantity of the product/item in the order"
        data_type: integer
        data_tests:
          - not_null
      - name: order_item_price_per_unit_at_purchase
        description: "Price per unit of the product/item at the time of pruchase"
        data_type: numeric(10, 3)
        data_tests:
          - not_null