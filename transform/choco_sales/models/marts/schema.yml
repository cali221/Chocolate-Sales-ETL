version: 2

models:
  - name: dim_sales_people
    description: "Distinct sales people"
    columns:
      - name: sales_person_id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: sales_person_name
        data_type: varchar(50)
        data_tests: 
          - not_null
          - unique
  - name: dim_online_store_customers
    description: "Customers (i.e. users) of the online store that might or might not have made a purchase"
    columns:
      - name: customer_id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: customer_name
        data_type: varchar(50)
        data_tests:
          - not_null
      - name: customer_username
        data_type: varchar(50)
        data_tests:
          - not_null
          - unique
      - name: customer_email
        data_type: varchar(100)
        data_tests:
          - not_null
      - name: customer_country_name
        data_type: varchar(50)
        data_tests:
          - not_null
  - name: dim_customers_countries
    description: "Distinct countries"
    columns:
      - name: country_id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: country_name
        data_type: varchar(50)
        data_tests: 
          - not_null
          - unique
  - name: dim_products
    description: "Distinct products available"
    columns:
      - name: product_id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: product_name
        data_type: varchar(50)
        data_tests: 
          - not_null
          - unique
      - name: product_available_at
        data_type: varchar(50)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Both', 'Sales Person', 'Online Store']
      - name: product_current_price
        data_type: numeric(10,3)
  - name: fct_salespeople_sales
    description: "Sales records from sales people"
    columns:
      - name: sales_id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: sales_amount_usd
        data_type: decimal
        data_tests: 
          - not_null
      - name: boxes_shipped
        data_type: integer
        data_tests:
          - not_null
      - name: date
        data_type: date
        data_tests: 
          - not_null
      - name: product_id
        data_type: text
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_products')
                field: product_id
      - name: country_id
        data_type: text
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_customers_countries')
                field: country_id
      - name: sales_person_id
        data_type: text
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_sales_people')
                field: sales_person_id
  - name: fct_online_store_ordered_items
    description: "Ordered items in orders from the online store"
    columns: 
      - name: order_item_id
        data_type: integer
        data_tests: 
          - not_null
          - unique
      - name: order_item_order_id
        data_type: integer
        data_tests: 
          - not_null
      - name: product_id
        data_type: text
        data_tests: 
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: order_item_quantity
        data_type: integer
        data_tests: 
          - not_null
      - name: order_item_price_per_unit_at_purchase
        data_type: numeric(10, 3)
        data_tests: 
          - not_null
      - name: order_created_at
        data_type: timestamptz
        data_tests: 
          - not_null
      - name: order_status_last_updated_at
        data_type: timestamptz
        data_tests:
          - not_null
      - name: order_current_status_id
        data_type: integer
        data_tests: 
          - not_null
          - relationships:
              arguments:
                to: ref('dim_statuses')
                field: status_id
      - name: order_customer_id
        data_type: integer
        data_tests:
          - not_null
          - relationships: 
              arguments:
                to: ref('dim_online_store_customers')
                field: customer_id
      - name: customer_country_id
        data_type: text
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers_countries')
                field: country_id
      - name: allocated_tax
        data_type: numeric(10, 5)
        data_tests: 
          - not_null
      - name: allocated_discount
        data_type: numeric(10, 5)
        data_tests:
          - not_null
      - name: allocated_shipping_costs
        data_type: numeric(10, 5)
        data_tests:
          - not_null

