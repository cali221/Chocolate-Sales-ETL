version: 2

models:
  - name: dim_sales_people
    description: "Distinct sales people"
    columns:
      - name: id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: name
        data_type: varchar(100)
        data_tests: 
          - not_null
          - unique
  - name: dim_countries
    description: "Distinct countries"
    columns:
      - name: id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: name
        data_type: varchar(100)
        data_tests: 
          - not_null
          - unique
  - name: dim_products
    description: "Distinct products"
    columns:
      - name: id
        data_type: text
        data_tests:
          - not_null
          - unique
      - name: name
        data_type: varchar(100)
        data_tests: 
          - not_null
          - unique
  - name: fct_sales
    description: "Sales records"
    columns:
      - name: id
        data_type: integer
        data_tests:
          - not_null
      - name: sales_amount_usd
        data_type: decimal
        data_tests: 
          - not_null
      - name: boxes_shipped
        data_type: integer
        data_tests:
          - not_null
      - name: date
        data_type: date
        data_tests: 
          - not_null
      - name: product_id
        data_type: text
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_products')
                field: id
      - name: country_id
        data_type: text
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_countries')
                field: id
      - name: sales_person_id
        data_type: text
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_sales_people')
                field: id

