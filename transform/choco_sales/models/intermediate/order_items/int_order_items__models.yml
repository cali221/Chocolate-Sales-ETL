version: 2

models:
  - name: int_order_items_enriched
    description: "Ordered items in orders in online store enriched with order data and allocated amounts for monetary fields from orders"
    columns: 
      - name: order_item_id
        data_type: integer
        data_tests: 
          - not_null
          - unique
      - name: order_item_product_id
        data_type: integer
        data_tests:
          - not_null
      - name: order_item_order_id
        data_type: integer
        data_tests:
          - not_null
      - name: order_item_quantity
        data_type: integer
        data_tests:
          - not_null
      - name: order_item_price_per_unit_at_purchase_usd
        data_type: numeric(10, 3)
        data_tests:
          - not_null
      - name: discount_per_unit_amount_usd
        data_type: numeric(10, 3)
        data_tests:
          - not_null
      - name: order_customer_id
        data_type: integer
        data_tests:
          - not_null
      - name: order_customer_country_id
        data_type: integer
        data_tests:
          - not_null
      - name: order_created_at
        data_type: timestamptz
        data_tests:
          - not_null
      - name: order_status_last_updated_at
        data_type: timestamptz
        data_tests:
          - not_null
      - name: order_current_status_id
        data_type: integer
        data_tests: 
          - not_null
      - name: order_started_pending_at
        data_type: timestamptz
      - name: order_started_processing_at
        data_type: timestamptz
      - name: order_started_in_transit_at
        data_type: timestamptz
      - name: order_arrived_at
        data_type: timestamptz
      - name: order_completed_at
        data_type: timestamptz
      - name: alloc_tax_amount_usd
        data_type: numeric
        data_tests:
          - not_null
      - name: alloc_shipping_costs_usd
        data_type: numeric
        data_tests:
          - not_null
      - name: alloc_discount_off_order_amount_usd
        data_type: numeric
        data_tests:
          - not_null