version: 2

models:
  - name: int_order_status_history_modified
    description: "Order status history for each order ID with all statuses update timestamps in one row"
    columns:
      - name: order_status_history_order_id
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: started_pending_at
        data_type: timestamptz
      - name: started_processing_at
        data_type: timestamptz
      - name: started_in_transit_at
        data_type: timestamptz
      - name: arrived_at
        data_type: timestamptz
      - name: completed_at
        data_type: timestamptz
  - name: int_orders_with_totals_and_new_country_id
    description: "Orders with status name instead of status ID and items related values"
    columns:
      - name: order_id
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: order_started_pending_at
        data_type: timestamptz
      - name: order_started_processing_at
        data_type: timestamptz
      - name: order_started_in_transit_at
        data_type: timestamptz
      - name: order_arrived_at
        data_type: timestamptz
      - name: order_completed_at
        data_type: timestamptz
      - name: order_created_at
        data_type: timestamptz
        data_tests:
          - not_null
      - name: order_status_last_updated_at
        data_type: timestamptz
        data_tests:
          - not_null
      - name: order_current_status_id
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_online_store__statuses')
                field: status_id
      - name: order_customer_id
        data_type: integer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_online_store__customers')
                field: customer_id
      - name: order_tax_amount_usd
        data_type: numeric(10, 3)
        data_tests: 
          - not_null
      - name: discount_off_order_amount_usd
        data_type: numeric(10, 3)
        data_tests:
          - not_null
      - name: order_shipping_costs_amount_usd
        data_type: numeric(10, 3)
        data_tests:
          - not_null
      - name: number_of_distinct_products
        description: "The number of distinct products in the order"
        data_tests: 
          - not_null
      - name: total_items_ordered
        description: "The total number of items ordered (sum of each product's quantity in the order)"
        data_tests: 
          - not_null
      - name: subtotal_usd
        description: "The total price of the items in the order (sum of quantity*price per unit at time of purchase)"
        data_tests: 
          - not_null
      - name: total_discount_amount_for_all_items_usd
        description: "Total discount amount for items ordered in USD"
        data_tests:
          - not_null